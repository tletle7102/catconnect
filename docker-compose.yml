services:
  catconnect:
    build: .
    image: catconnect
    container_name: catconnect-container
    restart: unless-stopped
    ports:
      - "${CATCONNECT_TOMCAT_PORT:-8099}:${CATCONNECT_TOMCAT_PORT:-8099}"
    environment:
      - CATCONNECT_SPRING_PROFILE_ACTIVE=${CATCONNECT_SPRING_PROFILE_ACTIVE}
      - CATCONNECT_TOMCAT_PORT=${CATCONNECT_TOMCAT_PORT}
      - CATCONNECT_SPRING_SECURITY_JWT_SECRET=${CATCONNECT_SPRING_SECURITY_JWT_SECRET}
      - CATCONNECT_SPRING_SECURITY_EXPIRATION=${CATCONNECT_SPRING_SECURITY_EXPIRATION}
      - CATCONNECT_DEV_DB_URL=${CATCONNECT_DEV_DB_URL}
      - CATCONNECT_DEV_DB_USERNAME=${CATCONNECT_DEV_DB_USERNAME}
      - CATCONNECT_DEV_DB_PASSWORD=${CATCONNECT_DEV_DB_PASSWORD}
      - CATCONNECT_DEV_DB_NAME=${CATCONNECT_DEV_DB_NAME}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - SOLAPI_API_KEY=${SOLAPI_API_KEY}
      - SOLAPI_API_SECRET=${SOLAPI_API_SECRET}
      - SOLAPI_SENDER_PHONE=${SOLAPI_SENDER_PHONE}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - infra-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.catconnect.rule=Host(`catconnect.matchhub.co.kr`)"
      - "traefik.http.routers.catconnect.entrypoints=websecure"
      - "traefik.http.routers.catconnect.tls.certresolver=letsencrypt"
      - "traefik.http.services.catconnect.loadbalancer.server.port=${CATCONNECT_TOMCAT_PORT:-8099}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${CATCONNECT_TOMCAT_PORT:-8099}/actuator/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

networks:
  infra-net:
    external: true

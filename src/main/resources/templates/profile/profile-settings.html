<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title>프로필 설정</title>
</head>
<body>
<section layout:fragment="content">
    <div class="container py-4">
        <h2 class="mb-4">프로필 설정</h2>

        <div class="row">
            <!-- 프로필 이미지 섹션 -->
            <div class="col-md-4 text-center mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-3">프로필 이미지</h5>

                        <!-- 프로필 이미지 미리보기 (클릭하여 변경) -->
                        <div class="mb-3">
                            <div id="profileImagePreview"
                                 class="rounded-circle mx-auto d-flex align-items-center justify-content-center position-relative"
                                 style="width: 150px; height: 150px; background-color: #e9ecef; overflow: hidden; cursor: pointer; transition: opacity 0.2s;"
                                 onclick="document.getElementById('profileImageInput').click()"
                                 title="클릭하여 이미지 변경">
                                <img th:if="${user.profileImageUrl != null}"
                                     th:src="${user.profileImageUrl}"
                                     alt="프로필 이미지"
                                     class="w-100 h-100"
                                     style="object-fit: cover;"
                                     id="profileImage">
                                <svg th:if="${user.profileImageUrl == null}"
                                     xmlns="http://www.w3.org/2000/svg"
                                     width="64" height="64"
                                     fill="#adb5bd"
                                     class="bi bi-person-fill"
                                     viewBox="0 0 16 16"
                                     id="defaultIcon">
                                    <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
                                </svg>
                                <!-- 호버 오버레이 -->
                                <div class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center rounded-circle"
                                     style="background-color: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s;"
                                     id="hoverOverlay">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 16 16">
                                        <path d="M10.5 8.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/>
                                        <path d="M2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4zm.5 2a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1m9 2.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0"/>
                                    </svg>
                                </div>
                            </div>
                            <div class="form-text mt-2">클릭하여 이미지 변경 (JPG, PNG, GIF, WEBP / 최대 10MB)</div>
                        </div>

                        <!-- 숨김 파일 입력 -->
                        <input type="file"
                               class="d-none"
                               id="profileImageInput"
                               accept="image/jpeg,image/png,image/gif,image/webp">

                        <!-- 삭제 버튼만 표시 -->
                        <div class="d-grid gap-2">
                            <button type="button"
                                    class="btn btn-outline-danger"
                                    id="deleteBtn"
                                    th:disabled="${user.profileImageUrl == null}"
                                    onclick="deleteProfileImage()">
                                이미지 삭제
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 프로필 정보 섹션 -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-3">프로필 정보</h5>

                        <div class="mb-3">
                            <label class="form-label text-muted">사용자 이름</label>
                            <p class="form-control-plaintext fw-bold" th:text="${user.username}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted">이메일</label>
                            <p class="form-control-plaintext" th:text="${user.email}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted">휴대폰 번호</label>
                            <p class="form-control-plaintext"
                               th:text="${user.phoneNumber != null ? user.phoneNumber : '등록되지 않음'}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted">가입일</label>
                            <p class="form-control-plaintext"
                               th:text="${#temporals.format(user.createdDttm, 'yyyy-MM-dd HH:mm')}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted">권한</label>
                            <p class="form-control-plaintext">
                                <span class="badge"
                                      th:classappend="${user.role == 'ADMIN' ? 'bg-danger' : 'bg-secondary'}"
                                      th:text="${user.role}"></span>
                            </p>
                        </div>

                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-primary" onclick="showPasswordVerifyModal()">정보 수정</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 회원 탈퇴 -->
        <div class="mt-4 mb-4 text-end">
            <button type="button" class="btn btn-link text-muted" style="font-size: 0.8rem;" onclick="showDeleteAccountModal()">회원 탈퇴</button>
        </div>
    </div>

    <!-- 비밀번호 확인 모달 (1단계) -->
    <div class="modal fade" id="passwordVerifyModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">본인 확인</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted" style="font-size: 0.85rem;">정보를 수정하려면 현재 비밀번호를 입력해주세요.</p>
                    <div class="mb-3">
                        <input type="password" class="form-control" id="verifyPassword" placeholder="현재 비밀번호">
                    </div>
                    <div id="verifyPasswordError" class="text-danger" style="display: none; font-size: 0.85rem;"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" onclick="verifyPasswordAndProceed()">확인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 정보 수정 모달 (2단계) -->
    <div class="modal fade" id="profileEditModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">정보 수정</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="profileEditError" class="alert alert-danger" style="display: none;"></div>
                    <div class="mb-3">
                        <label class="form-label">이메일</label>
                        <input type="email" class="form-control" id="editEmail" placeholder="새 이메일 주소">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">전화번호</label>
                        <input type="text" class="form-control" id="editPhone" placeholder="새 전화번호">
                    </div>
                    <hr>
                    <p class="text-muted" style="font-size: 0.85rem;">비밀번호 변경 시에만 아래를 입력하세요.</p>
                    <div class="mb-3">
                        <label class="form-label">새 비밀번호</label>
                        <input type="password" class="form-control" id="newPassword" placeholder="새 비밀번호 (6자 이상)">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" onclick="updateProfile()">저장</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 회원 탈퇴 확인 모달 -->
    <div class="modal fade" id="deleteAccountModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">회원 탈퇴</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-danger">정말 탈퇴하시겠습니까? 이 작업은 되돌릴 수 없습니다.</p>
                    <p class="text-muted" style="font-size: 0.85rem;">작성하신 게시글과 댓글의 작성자명이 "(탈퇴한 사용자)"로 변경됩니다.</p>
                    <div class="mb-3">
                        <label class="form-label">비밀번호 확인</label>
                        <input type="password" class="form-control" id="deletePassword" placeholder="현재 비밀번호를 입력하세요">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-danger" onclick="deleteAccount()">탈퇴</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const currentProfileImageUrl = /*[[${user.profileImageUrl}]]*/ null;
        const preview = document.getElementById('profileImagePreview');
        const hoverOverlay = document.getElementById('hoverOverlay');

        // 호버 효과
        preview.addEventListener('mouseenter', function() {
            hoverOverlay.style.opacity = '1';
        });
        preview.addEventListener('mouseleave', function() {
            hoverOverlay.style.opacity = '0';
        });

        // 파일 선택 시 바로 업로드
        document.getElementById('profileImageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // 파일 크기 검증 (10MB)
                if (file.size > 10 * 1024 * 1024) {
                    alert('파일 크기는 10MB 이하여야 합니다.');
                    e.target.value = '';
                    return;
                }

                // 바로 업로드 진행
                uploadProfileImage(file);
            }
        });

        // 프로필 이미지 업로드
        function uploadProfileImage(file) {
            const formData = new FormData();
            formData.append('file', file);

            // 업로드 중 표시
            preview.style.opacity = '0.5';
            preview.style.pointerEvents = 'none';

            fetch('/api/profile/image', {
                method: 'POST',
                body: formData,
                credentials: 'include'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.result === 'SUCCESS') {
                        location.reload();
                    } else {
                        alert('업로드 실패: ' + data.message);
                        preview.style.opacity = '1';
                        preview.style.pointerEvents = 'auto';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('업로드 중 오류가 발생했습니다.');
                    preview.style.opacity = '1';
                    preview.style.pointerEvents = 'auto';
                });
        }

        // 프로필 이미지 삭제
        function deleteProfileImage() {
            if (!confirm('프로필 이미지를 삭제하시겠습니까?')) {
                return;
            }

            fetch('/api/profile/image', {
                method: 'DELETE',
                credentials: 'include'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.result === 'SUCCESS') {
                        location.reload();
                    } else {
                        alert('삭제 실패: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('삭제 중 오류가 발생했습니다.');
                });
        }
        // 검증된 비밀번호 저장 (1단계에서 확인 후 2단계에서 사용)
        var verifiedPassword = null;

        // 1단계: 비밀번호 확인 모달 표시
        function showPasswordVerifyModal() {
            document.getElementById('verifyPassword').value = '';
            document.getElementById('verifyPasswordError').style.display = 'none';
            new bootstrap.Modal(document.getElementById('passwordVerifyModal')).show();
        }

        // 1단계 → 2단계 전환
        function verifyPasswordAndProceed() {
            var password = document.getElementById('verifyPassword').value;
            var errorEl = document.getElementById('verifyPasswordError');

            if (!password) {
                errorEl.textContent = '비밀번호를 입력해주세요.';
                errorEl.style.display = 'block';
                return;
            }

            axios.post('/api/profile/verify-password', { password: password }, { withCredentials: true })
                .then(function(response) {
                    // 검증된 비밀번호 저장
                    verifiedPassword = password;
                    // 1단계 모달 닫기
                    bootstrap.Modal.getInstance(document.getElementById('passwordVerifyModal')).hide();
                    // 2단계 모달 열기 (약간의 딜레이로 애니메이션 충돌 방지)
                    setTimeout(function() {
                        showProfileEditModal();
                    }, 300);
                })
                .catch(function(error) {
                    errorEl.textContent = error.response?.data?.message || '비밀번호가 일치하지 않습니다.';
                    errorEl.style.display = 'block';
                });
        }

        // 2단계: 정보 수정 모달 표시
        function showProfileEditModal() {
            // 폼 초기화
            document.getElementById('editEmail').value = '';
            document.getElementById('editPhone').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('profileEditError').style.display = 'none';
            document.getElementById('profileEditError').textContent = '';
            new bootstrap.Modal(document.getElementById('profileEditModal')).show();
        }

        // 정보 수정
        function updateProfile() {
            const errorDiv = document.getElementById('profileEditError');
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';

            const data = {};
            const email = document.getElementById('editEmail').value.trim();
            const phone = document.getElementById('editPhone').value.trim();
            const newPw = document.getElementById('newPassword').value;

            if (email) data.email = email;
            if (phone) data.phoneNumber = phone;
            if (newPw) {
                if (newPw.length < 6) {
                    errorDiv.textContent = '새 비밀번호는 6자 이상이어야 합니다.';
                    errorDiv.style.display = 'block';
                    return;
                }
                data.currentPassword = verifiedPassword;
                data.newPassword = newPw;
            }

            if (Object.keys(data).length === 0) {
                errorDiv.textContent = '변경할 항목을 입력해주세요.';
                errorDiv.style.display = 'block';
                return;
            }

            axios.put('/api/profile', data, { withCredentials: true })
                .then(response => {
                    // 모달 닫기
                    const modalEl = document.getElementById('profileEditModal');
                    const modalInstance = bootstrap.Modal.getInstance(modalEl);
                    if (modalInstance) modalInstance.hide();

                    // DOM 직접 업데이트
                    if (email) {
                        const emailElements = document.querySelectorAll('.form-control-plaintext');
                        // 이메일은 두 번째 form-control-plaintext (사용자 이름 다음)
                        if (emailElements.length > 1) {
                            emailElements[1].textContent = email;
                        }
                    }
                    if (phone) {
                        const phoneElements = document.querySelectorAll('.form-control-plaintext');
                        // 전화번호는 세 번째 form-control-plaintext
                        if (phoneElements.length > 2) {
                            phoneElements[2].textContent = phone;
                        }
                    }

                    // 에러 div 초기화
                    errorDiv.style.display = 'none';
                    errorDiv.textContent = '';

                    // 검증된 비밀번호 초기화
                    verifiedPassword = null;

                    UI.success('정보가 수정되었습니다.');
                })
                .catch(error => {
                    // 모달 열린 상태 유지, 에러 표시
                    const msg = (error.response && error.response.data && error.response.data.message)
                        ? error.response.data.message
                        : '정보 수정 중 오류가 발생했습니다.';
                    errorDiv.textContent = msg;
                    errorDiv.style.display = 'block';
                });
        }

        // 회원 탈퇴 모달 표시
        function showDeleteAccountModal() {
            document.getElementById('deletePassword').value = '';
            new bootstrap.Modal(document.getElementById('deleteAccountModal')).show();
        }

        // 회원 탈퇴 처리
        function deleteAccount() {
            const password = document.getElementById('deletePassword').value;
            if (!password) {
                UI.error('비밀번호를 입력해주세요.');
                return;
            }

            axios.delete('/api/profile', {
                data: { password: password },
                withCredentials: true
            })
                .then(response => {
                    UI.success('회원 탈퇴가 완료되었습니다.');
                    setTimeout(() => {
                        // 쿠키 삭제 후 홈으로 이동
                        document.cookie = 'jwtToken=; Max-Age=0; path=/';
                        document.cookie = 'refreshToken=; Max-Age=0; path=/';
                        window.location.href = '/';
                    }, 1500);
                })
                .catch(error => {
                    UI.handleApiError(error, '회원 탈퇴 중 오류가 발생했습니다.');
                });
        }
        /*]]>*/
    </script>
</section>
</body>
</html>

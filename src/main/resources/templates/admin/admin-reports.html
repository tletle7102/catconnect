<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/layout}">
<head>
    <meta charset="UTF-8">
    <title>신고 관리</title>
</head>
<section layout:fragment="content">
    <div class="card">
        <div class="card-body">
            <h1 class="card-title">신고 관리</h1>

            <!-- 필터 버튼 -->
            <div class="btn-group mb-3" role="group">
                <button type="button" class="btn btn-outline-secondary active" id="filter-all" onclick="filterReports(null)">전체</button>
                <button type="button" class="btn btn-outline-secondary" id="filter-pending" onclick="filterReports('PENDING')">미처리</button>
                <button type="button" class="btn btn-outline-secondary" id="filter-accepted" onclick="filterReports('ACCEPTED')">처리완료</button>
                <button type="button" class="btn btn-outline-secondary" id="filter-rejected" onclick="filterReports('REJECTED')">무혐의</button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>대상</th>
                        <th>신고자</th>
                        <th>사유</th>
                        <th>상태</th>
                        <th>날짜</th>
                        <th>액션</th>
                    </tr>
                    </thead>
                    <tbody id="report-list"></tbody>
                </table>
            </div>

            <!-- 페이지네이션 -->
            <nav aria-label="신고 페이지 네비게이션">
                <ul class="pagination justify-content-center" id="pagination"></ul>
            </nav>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        let currentPage = 0;
        const pageSize = 10;
        let currentFilter = null;

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            currentPage = parseInt(urlParams.get('page')) || 0;
            loadReports(currentPage);
        });

        function filterReports(status) {
            currentFilter = status;
            currentPage = 0;
            // 필터 버튼 활성화 상태 업데이트
            document.querySelectorAll('.btn-group .btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            if (status === null) document.getElementById('filter-all').classList.add('active');
            else if (status === 'PENDING') document.getElementById('filter-pending').classList.add('active');
            else if (status === 'ACCEPTED') document.getElementById('filter-accepted').classList.add('active');
            else if (status === 'REJECTED') document.getElementById('filter-rejected').classList.add('active');
            loadReports(0);
        }

        function loadReports(page) {
            const params = { page: page, size: pageSize };
            if (currentFilter) params.status = currentFilter;

            axios.get('/api/admin/reports', { params: params, withCredentials: true })
                .then(function(response) {
                    const pageData = response.data.data;
                    renderReports(pageData.content);
                    renderPagination(pageData);
                })
                .catch(function(error) {
                    UI.handleApiError(error, '신고 목록 조회 중 오류가 발생했습니다.');
                });
        }

        function getReasonLabel(reason) {
            const labels = {
                'ABUSE': '욕설/비방',
                'HATE_SPEECH': '혐오 표현',
                'INAPPROPRIATE': '부적절한 이미지',
                'SPAM': '스팸/도배',
                'OFF_TOPIC': '주제 무관',
                'OTHER': '기타'
            };
            return labels[reason] || reason;
        }

        function getStatusBadge(status) {
            if (status === 'PENDING') return '<span class="badge bg-warning text-dark">미처리</span>';
            if (status === 'ACCEPTED') return '<span class="badge bg-success">처리완료</span>';
            if (status === 'REJECTED') return '<span class="badge bg-secondary">무혐의</span>';
            return status;
        }

        function getTargetLabel(targetType, targetId) {
            if (targetType === 'BOARD') return '게시글 #' + targetId;
            if (targetType === 'COMMENT') return '댓글 #' + targetId;
            return targetType + ' #' + targetId;
        }

        function renderReports(reports) {
            const tbody = document.getElementById('report-list');
            tbody.innerHTML = '';
            if (reports.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">신고 내역이 없습니다.</td></tr>';
                return;
            }
            reports.forEach(function(report) {
                const tr = document.createElement('tr');
                const detailText = report.detail ? ' <small class="text-muted">(' + escapeHtml(report.detail) + ')</small>' : '';

                let actionHtml = '';
                if (report.status === 'PENDING') {
                    actionHtml =
                        '<div class="dropdown">' +
                        '  <button class="btn btn-sm btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">처리</button>' +
                        '  <ul class="dropdown-menu">' +
                        '    <li><a class="dropdown-item" href="#" onclick="resolveReport(' + report.id + ', \'REJECTED\'); return false;">무혐의</a></li>' +
                        '    <li><hr class="dropdown-divider"></li>' +
                        '    <li><a class="dropdown-item" href="#" onclick="resolveAndSanction(' + report.id + ', \'' + escapeHtml(report.reporter) + '\', \'WARNING\'); return false;">경고</a></li>' +
                        '    <li><a class="dropdown-item" href="#" onclick="resolveAndSanction(' + report.id + ', \'' + escapeHtml(report.reporter) + '\', \'POST_BAN_TEMP\'); return false;">작성정지(7일)</a></li>' +
                        '    <li><a class="dropdown-item" href="#" onclick="resolveAndSanction(' + report.id + ', \'' + escapeHtml(report.reporter) + '\', \'POST_BAN_PERMANENT\'); return false;">작성정지(영구)</a></li>' +
                        '    <li><hr class="dropdown-divider"></li>' +
                        '    <li><a class="dropdown-item text-danger" href="#" onclick="resolveAndSanction(' + report.id + ', \'' + escapeHtml(report.reporter) + '\', \'ACCOUNT_BAN\'); return false;">강제탈퇴</a></li>' +
                        '  </ul>' +
                        '</div>';
                } else {
                    actionHtml = '<span class="text-muted">-</span>';
                }

                tr.innerHTML =
                    '<td>' + report.id + '</td>' +
                    '<td>' + getTargetLabel(report.targetType, report.targetId) + '</td>' +
                    '<td>' + escapeHtml(report.reporter) + '</td>' +
                    '<td>' + getReasonLabel(report.reason) + detailText + '</td>' +
                    '<td>' + getStatusBadge(report.status) + '</td>' +
                    '<td>' + new Date(report.createdDttm).toLocaleString('ko-KR') + '</td>' +
                    '<td>' + actionHtml + '</td>';

                tbody.appendChild(tr);
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function resolveReport(reportId, status) {
            axios.put('/api/admin/reports/' + reportId + '/resolve', { status: status }, { withCredentials: true })
                .then(function() {
                    UI.success(status === 'REJECTED' ? '무혐의 처리되었습니다.' : '신고가 처리되었습니다.');
                    loadReports(currentPage);
                })
                .catch(function(error) {
                    UI.handleApiError(error, '신고 처리 중 오류가 발생했습니다.');
                });
        }

        async function resolveAndSanction(reportId, reporter, sanctionType) {
            const sanctionLabels = {
                'WARNING': '경고',
                'POST_BAN_TEMP': '7일 작성정지',
                'POST_BAN_PERMANENT': '영구 작성정지',
                'ACCOUNT_BAN': '강제탈퇴'
            };
            const label = sanctionLabels[sanctionType] || sanctionType;
            const confirmed = await UI.confirm(
                '피신고자에게 "' + label + '" 제재를 적용하시겠습니까?',
                '제재 확인'
            );
            if (!confirmed) return;

            // 먼저 신고 수락 처리
            axios.put('/api/admin/reports/' + reportId + '/resolve', { status: 'ACCEPTED' }, { withCredentials: true })
                .then(function(response) {
                    // 제재 적용 - 피신고자 정보는 서버에서 신고 대상으로부터 조회해야 하지만,
                    // 현재 API 구조상 username을 직접 전달해야 하므로 reporter 기반이 아닌
                    // 신고 대상의 작성자를 사용해야 합니다.
                    // 여기서는 제재 API를 별도로 호출합니다.
                    return axios.post('/api/admin/reports/sanction', {
                        username: reporter,
                        sanctionType: sanctionType,
                        reason: '신고 #' + reportId + ' 처리'
                    }, { withCredentials: true });
                })
                .then(function() {
                    UI.success('"' + label + '" 제재가 적용되었습니다.');
                    loadReports(currentPage);
                })
                .catch(function(error) {
                    UI.handleApiError(error, '제재 적용 중 오류가 발생했습니다.');
                    loadReports(currentPage);
                });
        }

        // 페이지네이션 렌더링
        function renderPagination(pageData) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            const totalPages = pageData.totalPages;
            const currentPageNum = pageData.number;

            if (totalPages <= 1) return;

            // 이전 버튼
            const prevLi = document.createElement('li');
            prevLi.className = 'page-item' + (pageData.first ? ' disabled' : '');
            prevLi.innerHTML = '<a class="page-link" href="#" onclick="goToPage(' + (currentPageNum - 1) + '); return false;">이전</a>';
            pagination.appendChild(prevLi);

            // 페이지 번호 (최대 5개 표시)
            let startPage = Math.max(0, currentPageNum - 2);
            let endPage = Math.min(totalPages - 1, startPage + 4);
            if (endPage - startPage < 4) {
                startPage = Math.max(0, endPage - 4);
            }

            for (let i = startPage; i <= endPage; i++) {
                const li = document.createElement('li');
                li.className = 'page-item' + (i === currentPageNum ? ' active' : '');
                li.innerHTML = '<a class="page-link" href="#" onclick="goToPage(' + i + '); return false;">' + (i + 1) + '</a>';
                pagination.appendChild(li);
            }

            // 다음 버튼
            const nextLi = document.createElement('li');
            nextLi.className = 'page-item' + (pageData.last ? ' disabled' : '');
            nextLi.innerHTML = '<a class="page-link" href="#" onclick="goToPage(' + (currentPageNum + 1) + '); return false;">다음</a>';
            pagination.appendChild(nextLi);
        }

        function goToPage(page) {
            if (page < 0) return;
            currentPage = page;
            loadReports(page);
            const url = new URL(window.location);
            url.searchParams.set('page', page);
            window.history.pushState({}, '', url);
        }
    </script>
</section>
</html>
